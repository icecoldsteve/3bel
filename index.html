<!DOCTYPE html>
<html lang="nl" data-lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

  <meta name="theme-color" content="#1E6FD9" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#0B1220" media="(prefers-color-scheme: dark)">

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="3BEL">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">

  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="icon" href="/favicon.ico">

  <title>3BEL — Ramenwasplanning</title>
  <meta name="description" content="Planning, klantenbeheer en dagafsluiting voor ramenwasbedrijf 3BEL.">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <a href="#main" class="skip-link">Naar inhoud</a>

  <!-- ── App bar ── -->
  <header class="appbar">
    <div class="appbar-brand">
      <span class="appbar-logo" aria-hidden="true">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="12" y1="3" x2="12" y2="21"/><line x1="3" y1="12" x2="21" y2="12"/></svg>
      </span>
      <span class="appbar-title">3BEL</span>
    </div>
    <h1 id="view-title" class="appbar-viewtitle">Kalender</h1>
    <button id="btn-settings" class="appbar-btn" aria-label="Instellingen" type="button">
      <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </button>
  </header>

  <!-- ── Main views ── -->
  <main id="main" class="main">
    <section id="view-kalender" class="view" data-view="kalender"></section>
    <section id="view-klanten" class="view" data-view="klanten" hidden></section>
    <section id="view-autoplan" class="view" data-view="autoplan" hidden></section>
    <section id="view-afsluiting" class="view" data-view="afsluiting" hidden></section>
    <section id="view-instellingen" class="view" data-view="instellingen" hidden></section>
  </main>

  <!-- ── Bottom nav ── -->
  <nav class="tabbar" aria-label="Hoofdnavigatie">
    <button class="tab is-active" data-goto="kalender" type="button">
      <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      <span>Kalender</span>
    </button>
    <button class="tab" data-goto="klanten" type="button">
      <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      <span>Klanten</span>
    </button>
    <button class="tab" data-goto="autoplan" type="button">
      <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="13 2 13 9 20 9"/><path d="M3 7l4-4 4 4"/><path d="M7 3v8"/><path d="M21 17l-4 4-4-4"/><path d="M17 21v-8"/></svg>
      <span>Auto-plan</span>
    </button>
    <button class="tab" data-goto="afsluiting" type="button">
      <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
      <span>Afsluiting</span>
    </button>
  </nav>

  <!-- ── Modal + toast hosts ── -->
  <div id="modal-host" class="modal-host" hidden></div>
  <div id="toast-host" class="toast-host" aria-live="polite"></div>

  <script src="/js/db.js"></script>
  <script src="/js/geo.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
